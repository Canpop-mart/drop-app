name: Clippy check
on: push

jobs:
  clippy_check:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf libudev-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libssl-dev \
            libarchive-dev
      # Pinned to match src-tauri/rust-toolchain.toml — see the comment
      # in that file for why nightly is dated rather than tracking latest.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-20
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - name: cargo clippy
        working-directory: ./src-tauri
        run: cargo clippy --all-targets
