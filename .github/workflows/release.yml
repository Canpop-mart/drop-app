name: "publish"

on:
  workflow_dispatch: {}
  release:
    types: [published]

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libudev-dev libssl-dev libgtk-3-dev libglib2.0-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libfuse2

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: true
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

      # Strip bundled WebKitGTK from the AppImage so it uses the system's
      # version instead. The bundled Ubuntu 22.04 WebKit is incompatible
      # with SteamOS/non-Ubuntu GPU drivers (EGL crash + version mismatch).
      - name: Fix AppImage for SteamOS compatibility
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found, skipping"
            exit 0
          fi
          echo "Fixing AppImage: $APPIMAGE"

          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract

          # Remove bundled WebKitGTK libs that conflict with system versions
          find squashfs-root -name "libwebkit2gtk*" -delete
          find squashfs-root -name "libjavascriptcoregtk*" -delete
          find squashfs-root -name "WebKitNetworkProcess" -delete
          find squashfs-root -name "WebKitWebProcess" -delete
          find squashfs-root -name "libsoup*" -delete

          # Download appimagetool to repack
          curl -Lo appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          # Repack the AppImage
          ARCH=x86_64 ./appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

      # Re-upload the fixed AppImage to the release
      - name: Upload fixed AppImage
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then exit 0; fi
          FILENAME=$(basename "$APPIMAGE")
          TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.4.0")

          # Delete the old AppImage asset and upload the fixed one
          RELEASE_ID=$(gh release view "$TAG_NAME" --json id -q .id 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            gh release delete-asset "$TAG_NAME" "$FILENAME" --yes 2>/dev/null || true
            gh release upload "$TAG_NAME" "$APPIMAGE" --clobber
          fi
