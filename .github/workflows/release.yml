name: "publish"

on:
  workflow_dispatch: {}
  release:
    types: [published]

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libudev-dev libssl-dev libgtk-3-dev libglib2.0-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libfuse2 libarchive-dev

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: true
        with:
          # Use the tag from the release event so we don't create a second release.
          # Falls back to v__VERSION__ for manual workflow_dispatch triggers.
          tagName: ${{ github.event.release.tag_name || 'v__VERSION__' }}
          releaseName: ${{ github.event.release.tag_name || 'v__VERSION__' }}
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Repack the AppImage: keep WebKitGTK and its dependencies (needed on
      # SteamOS which doesn't ship webkit2gtk-4.1), but remove libs that clash
      # with the host (glib, EGL/mesa — cause crashes due to symbol mismatches
      # between Ubuntu 22.04 build env and SteamOS runtime).
      # Also bundles umu-launcher so Windows game compatibility works out of the box.
      - name: Fix AppImage for SteamOS compatibility
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found, skipping"
            exit 0
          fi
          echo "Fixing AppImage: $APPIMAGE"

          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract

          # Remove libs that conflict with SteamOS host, but KEEP WebKitGTK
          # and its dependencies so the app works without system webkit installed.
          if [ -d squashfs-root/usr/lib ]; then
            cd squashfs-root/usr/lib
            # Remove problematic glib/gio/mesa/EGL libs that cause symbol clashes
            rm -f libglib-2.0.so* libgio-2.0.so* libgobject-2.0.so* libgmodule-2.0.so*
            rm -f libEGL*.so* libGL*.so* libGLX*.so* libGLdispatch*.so*
            rm -f libdrm*.so* libgbm*.so* libwayland*.so*
            rm -f libffi*.so* libpcre2*.so* libmount*.so* libblkid*.so*
            # Keep: libwebkit2gtk-4.1, libjavascriptcoregtk-4.1, libsoup-3.0,
            #        and any other non-conflicting deps Tauri bundled
            echo "Kept bundled libs:"
            ls -la *.so* 2>/dev/null || echo "(none remaining)"
            cd ../../..
          fi

          # Bundle umu-launcher (zipapp) so Windows game compat works out of the box.
          # Same approach as the Flatpak build script — downloads the standalone zipapp
          # release which is a single self-contained executable.
          echo "Downloading umu-launcher..."
          UMU_URL=$(curl -fsSL "https://api.github.com/repos/Open-Wine-Components/umu-launcher/releases/latest" | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(next((a['browser_download_url'] for a in d['assets'] if 'zipapp.tar' in a['name']), ''))
          ")
          if [ -n "$UMU_URL" ]; then
            curl -fsSL -o /tmp/umu.tar "$UMU_URL"
            tar -xf /tmp/umu.tar -C /tmp/
            UMU_BIN=$(find /tmp -maxdepth 4 -name "umu-run" -type f | head -1)
            if [ -n "$UMU_BIN" ]; then
              mkdir -p squashfs-root/usr/bin
              cp "$UMU_BIN" squashfs-root/usr/bin/umu-run
              chmod +x squashfs-root/usr/bin/umu-run
              echo "Bundled umu-run: $(squashfs-root/usr/bin/umu-run --version 2>&1 || echo 'ok')"
            else
              echo "WARNING: umu-run not found in archive, skipping bundle"
            fi
            rm -f /tmp/umu.tar
          else
            echo "WARNING: Could not get umu-launcher download URL, skipping bundle"
          fi

          # Download appimagetool to repack
          curl -Lo appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          # Repack the AppImage
          ARCH=x86_64 ./appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

      # Re-upload the fixed AppImage to the release
      - name: Upload fixed AppImage
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then exit 0; fi
          FILENAME=$(basename "$APPIMAGE")
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          fi

          # Delete the old AppImage asset and upload the fixed one
          RELEASE_ID=$(gh release view "$TAG_NAME" --json id -q .id 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            gh release delete-asset "$TAG_NAME" "$FILENAME" --yes 2>/dev/null || true
            gh release upload "$TAG_NAME" "$APPIMAGE" --clobber
          fi
