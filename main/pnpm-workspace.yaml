onlyBuiltDependencies:
  - "@parcel/watcher"
  - esbuild
  - unrs-resolver

overrides:
  devalue@>=5.1.0 <5.6.2: ">=5.6.2"
  devalue@>=5.3.0 <=5.6.1: ">=5.6.2"
  diff@>=6.0.0 <8.0.3: ">=8.0.3"
  h3@<=1.15.4: ">=1.15.5"
  lodash@>=4.0.0 <=4.17.22: ">=4.17.23"
  markdown-it@>=13.0.0 <14.1.1: ">=14.1.1"
  node-forge@<1.3.2: ">=1.3.2"
  seroval@<1.4.1: ">=1.4.1"
  seroval@<=1.4.0: ">=1.4.1"
  # Dependabot 2026-06-16 security bumps. Kept in sync with the root
  # pnpm-workspace.yaml — this file governs the standalone `main` build
  # (scripts/build.mjs cd's into main/ and runs `pnpm install` here), so the
  # root overrides do NOT reach it. Scoped to the vulnerable range and capped
  # below the next major to avoid breaking version jumps. The single tar line
  # below supersedes the earlier 7.5.3 / 7.5.4 / 7.5.7 bumps.
  shell-quote@<1.8.4: ">=1.8.4" # alert #130 critical
  esbuild@<0.28.1: ">=0.28.1" # alerts #134 high, #133 low
  vite@>=7.0.0 <7.3.5: ">=7.3.5 <8" # alerts #137 high, #139 medium
  tar@>=7.0.0 <7.5.16: ">=7.5.16" # alert #140 medium
  launch-editor@<2.14.1: ">=2.14.1" # alert #138 medium
  js-yaml@>=4.0.0 <4.2.0: ">=4.2.0" # alert #136 medium
  "@babel/core@<7.29.6": ">=7.29.6 <8" # alert #135 low
