[toolchain]
# Pinned to a known-good nightly for deterministic builds. The previous
# borrowck failure that triggered this pin turned out to be unrelated
# (a bad git rev of droplet-rs picked up by `cargo update`, since fixed
# in games/Cargo.toml), but pinning the toolchain is still worthwhile
# defensively — keeps CI insulated from random nightly regressions.
# rc.4 built successfully on 2026-04-25; this date sits comfortably
# inside that window. Bumping is fine when there's a reason.
channel = "nightly-2026-04-20"
