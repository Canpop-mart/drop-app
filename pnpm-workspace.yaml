packages:
  - "main"
  - "libs/drop-base"

# Native deps whose install/build scripts pnpm is allowed to run.
# pnpm 10+ blocks postinstall build scripts by default; these four
# genuinely need to compile or fetch a platform binary:
#   - sharp           image processing native bindings
#   - @parcel/watcher native file-watcher (HMR)
#   - esbuild         downloads/links its platform binary
#   - unrs-resolver   native module resolver
# (Replaces an earlier broken `allowBuilds:` placeholder block whose
#  values were literally "set this to true or false" — not a real pnpm
#  key, so those three were silently treated as ignored builds and made
#  `pnpm install` exit non-zero on pnpm 11.)
onlyBuiltDependencies:
  - sharp
  - "@parcel/watcher"
  - esbuild
  - unrs-resolver

overrides:
  cross-spawn@<6.0.6: ">=6.0.6"
  cross-spawn@>=7.0.0 <7.0.5: ">=7.0.5"
  form-data@<2.5.4: ">=2.5.4"
  got@<11.8.5: ">=11.8.5"
  http-cache-semantics@<4.1.1: ">=4.1.1"
  lodash@<4.17.21: ">=4.17.21"
  lodash@>=4.0.0 <4.17.21: ">=4.17.21"
  minimist@>=1.0.0 <1.2.6: ">=1.2.6"
  nth-check@<2.0.1: ">=2.0.1"
  semver-regex@<3.1.3: ">=3.1.3"
  semver-regex@<3.1.4: ">=3.1.4"
  semver@>=7.0.0 <7.5.2: ">=7.5.2"
  sharp@<0.30.5: ">=0.30.5"
  sharp@<0.32.6: ">=0.32.6"
  tmp@<=0.2.3: ">=0.2.4"
  tough-cookie@<4.1.3: ">=4.1.3"
  trim-newlines@<3.0.1: ">=3.0.1"
  # Dependabot 2026-06 security bumps — scoped to the vulnerable major
  # ranges so unrelated 1.x/2.x transitive copies are left untouched.
  brace-expansion@>=5.0.0 <5.0.6: ">=5.0.6"
  devalue@>=5.6.3 <5.8.1: ">=5.8.1"
  nitropack@<2.13.4: ">=2.13.4"
  postcss@<8.5.10: ">=8.5.10"
  simple-git@<3.36.0: ">=3.36.0"
  ws@>=8.0.0 <8.20.1: ">=8.20.1"
