app-id: org.droposs.client
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

command: drop-app

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=all          # GPU + controllers
  # Network (Drop server + game downloads)
  - --share=network
  # Filesystem: full host access so Drop can reach game libraries anywhere
  # (NAS mounts, external drives, /home, etc.)
  - --filesystem=host
  # Notifications
  - --talk-name=org.freedesktop.Notifications
  # Ensure /app/bin is on PATH so umu-run is found when launching games
  - --env=PATH=/app/bin:/usr/bin:/bin

modules:

  # ── umu-launcher ─────────────────────────────────────────────────────────────
  # Required by Drop on Linux to launch Windows games via Proton.
  # Downloaded from the official GitHub release (zipapp.tar bundle).
  - name: umu-launcher
    buildsystem: simple
    sources: []
    build-commands:
      - |
        set -e
        echo ">> Fetching umu-launcher release info..."
        UMU_URL=$(curl -fsSL "https://api.github.com/repos/Open-Wine-Components/umu-launcher/releases/latest" | \
          python3 -c "
        import sys, json
        d = json.load(sys.stdin)
        url = next((a['browser_download_url'] for a in d['assets'] if 'zipapp.tar' in a['name']), '')
        print(url)
        ")
        if [ -z "$UMU_URL" ]; then
          echo "ERROR: Could not determine umu-launcher download URL"
          exit 1
        fi
        echo ">> Downloading: $UMU_URL"
        curl -fsSL -o /tmp/umu.tar "$UMU_URL"
        tar -xf /tmp/umu.tar -C /tmp/
        UMU_BIN=$(find /tmp -maxdepth 4 -name "umu-run" -type f | head -1)
        if [ -z "$UMU_BIN" ]; then
          echo "ERROR: umu-run binary not found in archive"
          exit 1
        fi
        install -Dm755 "$UMU_BIN" /app/bin/umu-run
        rm -f /tmp/umu.tar
        echo ">> umu-run installed."

  # ── drop-app ─────────────────────────────────────────────────────────────────
  - name: drop-app
    buildsystem: simple

    build-options:
      # Make Rust (rustup) and Node 22 available
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
      env:
        CARGO_HOME: /run/build/drop-app/.cargo
        RUSTUP_HOME: /run/build/drop-app/.rustup
        # Redirect HOME so rustup/cargo don't try to write to /root
        HOME: /run/build/drop-app
        # pnpm global install target
        npm_config_prefix: /run/build/drop-app/.npm-global
        # Silence npm funding/update noise
        npm_config_fund: 'false'
        npm_config_update_notifier: 'false'

    sources:
      - type: git
        url: https://github.com/Drop-OSS/drop-app.git
        tag: v0.4.0-rc-4
        # Full clone needed so submodule fetches work
        disable-shallow-clone: true

    build-commands:

      # ── Rust nightly ────────────────────────────────────────────────────────
      # Drop uses nightly-only features (#![feature(...)])
      - rustup toolchain install nightly --profile minimal
      - rustup default nightly

      # ── pnpm ────────────────────────────────────────────────────────────────
      - mkdir -p /run/build/drop-app/.npm-global
      - npm install -g pnpm

      # ── Submodules ──────────────────────────────────────────────────────────
      - git submodule update --init --recursive

      # ── Patch: remove AppImage from bundle targets ───────────────────────
      # AppImage tools can't run inside a Flatpak build sandbox.
      - |
        python3 -c "
        import json
        with open('src-tauri/tauri.conf.json') as f:
            c = json.load(f)
        c['bundle']['targets'] = [t for t in c['bundle']['targets'] if t not in ('appimage', 'dmg')]
        with open('src-tauri/tauri.conf.json', 'w') as f:
            json.dump(c, f, indent=2)
        print('  [OK] tauri.conf.json: removed appimage/dmg targets')
        "

      # ── Patch: fix WindowsLauncher (absolute path + spaces in path) ───────
      # This makes PC game launch work even when paths contain spaces.
      - |
        python3 << 'PYEOF'
        path = "src-tauri/process/src/process_handlers.rs"
        with open(path) as f:
            content = f.read()

        # 1. Add ParsedCommand to imports
        old_import = 'use crate::{error::ProcessError, process_manager::ProcessHandler};'
        new_import = 'use crate::{error::ProcessError, parser::ParsedCommand, process_manager::ProcessHandler};'
        if old_import in content:
            content = content.replace(old_import, new_import)
            print("  [OK] ParsedCommand import added")
        elif new_import in content:
            print("  [SKIP] ParsedCommand import already present")
        else:
            print("  [WARN] Could not find import line")

        # 2. Fix WindowsLauncher::create_launch_process
        old = '        _current_dir: &str,\n        _database: &Database,\n    ) -> Result<String, ProcessError> {\n        Ok(format!("cmd /C \\"{}\\"", launch_command))\n    }'
        new = '        current_dir: &str,\n        _database: &Database,\n    ) -> Result<String, ProcessError> {\n        let mut parsed = ParsedCommand::parse(launch_command)?;\n        parsed.make_absolute(PathBuf::from(current_dir));\n        Ok(parsed.reconstruct())\n    }'
        if old in content:
            content = content.replace(old, new)
            print("  [OK] WindowsLauncher patched (absolute path + space handling)")
        elif 'parsed.make_absolute' in content:
            print("  [SKIP] WindowsLauncher already patched")
        else:
            print("  [WARN] WindowsLauncher patch target not found")

        with open(path, "w") as f:
            f.write(content)
        PYEOF

      # ── JS dependencies ──────────────────────────────────────────────────────
      - /run/build/drop-app/.npm-global/bin/pnpm install

      # ── Compile ─────────────────────────────────────────────────────────────
      - /run/build/drop-app/.npm-global/bin/pnpm tauri build

      # ── Install binary ───────────────────────────────────────────────────────
      - install -Dm755 src-tauri/target/release/drop-app /app/bin/drop-app

      # ── Install icon ─────────────────────────────────────────────────────────
      - install -Dm644 src-tauri/icons/icon.png /app/share/icons/hicolor/256x256/apps/org.droposs.client.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/512x512/apps/org.droposs.client.png

      # ── Install .desktop entry ───────────────────────────────────────────────
      - |
        mkdir -p /app/share/applications
        cat > /app/share/applications/org.droposs.client.desktop << 'DESKEOF'
        [Desktop Entry]
        Name=Drop
        Comment=Drop OSS Game Client
        Exec=drop-app
        Icon=org.droposs.client
        Type=Application
        Categories=Game;
        Terminal=false
        StartupNotify=true
        X-Flatpak=org.droposs.client
        DESKEOF
